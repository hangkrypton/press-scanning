# config/sources.yaml
#
# Theo dõi MỘT SỰ KIỆN/CHỦ ĐỀ thời sự cùng lúc qua NHIỀU báo điện tử Việt Nam,
# để thấy "bức tranh chung" — báo nào khai thác góc nào của cùng một sự kiện.
#
# outlets: — danh mục báo VN dùng chung cho mọi chủ đề bên dưới (mỗi báo chỉ
# khai báo feed_url một lần ở đây, không lặp lại trong từng topic). Thêm/bớt
# báo — sửa trực tiếp danh sách này.
#   name      : tên hiển thị
#   feed_url  : URL feed RSS/Atom. Nếu không biết, chạy thử:
#               `python -m scripts.discover_feed https://tenbao.vn` để tự dò.
#
# topics: — mỗi chủ đề có:
#   id        : mã ngắn không dấu, dùng làm khoá lưu trạng thái đã đọc (không
#               đổi sau khi đã chạy vài lần — đổi sẽ mất lịch sử dedupe của
#               chủ đề đó, bot sẽ coi mọi bài cũ là "mới" lại lần đầu)
#   name      : tên hiển thị đầy đủ (tiếng Việt có dấu, hiện trong bản tóm tắt)
#   keywords  : danh sách từ khóa — một bài được coi là "khớp chủ đề" nếu tiêu
#               đề hoặc tóm tắt chứa BẤT KỲ từ khóa nào (so khớp không phân
#               biệt hoa/thường, không tự suy luận đồng nghĩa — nên viết vài
#               biến thể cách báo hay dùng)
#   outlets   : (tuỳ chọn) danh sách TÊN báo cần quét cho riêng chủ đề này —
#               phải khớp đúng chính tả với tên trong outlets: ở trên. Không
#               khai báo = mặc định quét TẤT CẢ báo trong outlets:. Với chủ đề
#               chuyên biệt (vd. chỉ liên quan kinh tế), nên giới hạn lại để
#               đỡ tốn thời gian quét những báo chắc chắn không đăng.
#
# Thêm chủ đề mới: copy khối mẫu `quy_tap_hai_cot` bên dưới, đổi id/name/
# keywords, không cần đụng vào code.

