# config/sources.yaml
#
# Danh mục báo điện tử Việt Nam dùng để tự động phát hiện các chủ đề thời sự
# đang được nhiều báo cùng đưa tin trong ngày ("bức tranh chung"). Không khai
# báo chủ đề trước — việc cụm nhóm sự kiện do Claude tự làm khi đọc
# new_items.json trong scheduled task (xem
# ~/.claude/scheduled-tasks/press-scanning/SKILL.md).
#
# outlets: — danh mục báo VN dùng chung.
#   name      : tên hiển thị
#   feed_url  : URL feed RSS/Atom. Nếu không biết, chạy thử:
#               `python -m scripts.discover_feed https://tenbao.vn` để tự dò.

outlets:

- name: VnExpress
  feed_url: https://vnexpress.net/rss/tin-moi-nhat.rss
- name: Tuổi Trẻ Online
  feed_url: https://tuoitre.vn/rss/tin-moi-nhat.rss
- name: Báo Thanh Niên
  feed_url: https://thanhnien.vn/rss/home.rss
- name: Báo Dân Trí
  feed_url: https://dantri.com.vn/rss/tin-moi-nhat.rss
- name: VietNamNet  # LỖI: RSS có vẻ đã ngừng hẳn, chưa tìm được feed thay thế — xem CLAUDE.md "Known gaps"
  feed_url: https://vietnamnet.vn/rss/tin-moi-nhat.rss
- name: CafeF
  feed_url: https://cafef.vn/home.rss
- name: BBC News Tiếng Việt
  feed_url: https://feeds.bbci.co.uk/vietnamese/rss.xml
- name: Báo Lao Động  # LỖI: chặn bot bằng JS cookie-challenge — xem CLAUDE.md "Known gaps"
  feed_url: https://laodong.vn/rss/home.rss
- name: Báo Tiền Phong
  feed_url: https://tienphong.vn/rss/home.rss
- name: Thời báo VTV (VTV Online)
  feed_url: https://vtv.vn/rss/home.rss
- name: Báo Điện tử VOV
  feed_url: https://vov.vn/rss.xml
- name: Báo Nhân Dân
  feed_url: https://nhandan.vn/rss/home.rss
- name: VietnamPlus (TTXVN)
  feed_url: https://www.vietnamplus.vn/rss/home.rss
- name: Báo Điện tử Chính phủ
  feed_url: https://baochinhphu.vn/home.rss
- name: Báo Công an Nhân dân
  feed_url: https://cand.vn/rss/home.rss
- name: Báo Sài Gòn Giải Phóng
  feed_url: https://www.sggp.org.vn/rss/home.rss
- name: Báo Xây dựng
  feed_url: https://baoxaydung.vn/rss/home.rss
- name: VnEconomy
  feed_url: https://vneconomy.vn/tin-moi.rss
- name: Báo Đầu Tư  # LỖI: feed tồn tại nhưng luôn rỗng, có vẻ đã bỏ bảo trì — xem CLAUDE.md "Known gaps"
  feed_url: https://baodautu.vn/rss
- name: Báo Quân đội Nhân dân  # LỖI: cần session cookie mới đọc được, ngoài khả năng hiện tại — xem CLAUDE.md "Known gaps"
